server:
  port: 0

spring:
  datasource:
    url: jdbc:h2:mem:wallet-${random.uuid};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    contexts: demo

wallet:
  optimistic-lock:
    max-attempts: 100
    initial-delay-ms: 1
    max-delay-ms: 20
    multiplier: 1.5

logging:
  level:
    org.hibernate.SQL: WARN
